<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#2563eb"/>
  <g transform="translate(256,256)">
    <!-- Sine wave representing EM field -->
    <path d="M-160,0 C-120,-80 -80,-80 -40,0 C0,80 40,80 80,0 C120,-80 160,-80 200,0"
          fill="none" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.9"/>
    <path d="M-160,0 C-120,60 -80,60 -40,0 C0,-60 40,-60 80,0 C120,60 160,60 200,0"
          fill="none" stroke="#93c5fd" stroke-width="16" stroke-linecap="round" opacity="0.7"/>
    <!-- Arrow showing propagation -->
    <line x1="-180" y1="120" x2="180" y2="120" stroke="white" stroke-width="8" opacity="0.5"/>
    <polygon points="180,120 160,110 160,130" fill="white" opacity="0.5"/>
  </g>
  <!-- EM text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="800" font-size="80" fill="white" opacity="0.95">EM</text>
</svg>
